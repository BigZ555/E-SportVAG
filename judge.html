<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoChampion — Judge Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <nav class="navbar">
    <div class="nav-logo">
      <svg class="nav-pin" viewBox="0 0 24 32" fill="none"><path d="M12 0C5.4 0 0 5.4 0 12C0 21 12 32 12 32C12 32 24 21 24 12C24 5.4 18.6 0 12 0Z" fill="var(--accent)"/><circle cx="12" cy="12" r="5" fill="var(--bg)"/></svg>
      <span class="nav-title">GEO<span class="accent">CHAMP</span></span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Standings</a>
      <span class="nav-link judge-badge" id="judgeNameBadge">Judge</span>
      <button class="btn btn-ghost btn-sm" onclick="handleLogout()">Logout</button>
    </div>
  </nav>

  <main class="container">
    <header class="page-header">
      <div class="header-label" id="judgeLabel">Judge Panel</div>
      <h1 class="page-title">Start a <span class="accent">Match</span></h1>
    </header>

    <!-- Match Form -->
    <div class="card match-form-card" id="matchFormCard">
      <h3 class="card-title">
        <svg viewBox="0 0 40 56" fill="none" width="18"><path d="M20 0C9 0 0 9 0 20C0 35 20 56 20 56C20 56 40 35 40 20C40 9 31 0 20 0Z" fill="var(--accent)"/><circle cx="20" cy="20" r="8" fill="var(--bg)"/></svg>
        New Match
      </h3>

      <div class="match-teams-grid">
        <!-- Team A -->
        <div class="team-section">
          <div class="team-section-header">Team A</div>
          <div class="form-group">
            <label class="form-label">Select Team</label>
            <select id="teamASelect" class="form-input form-select" onchange="fillTeamPlayers('A')">
              <option value="">— Choose team —</option>
            </select>
          </div>
          <div id="teamAPlayers" class="players-grid"></div>
          <div class="form-group score-group">
            <label class="form-label">Team A — Player Scores</label>
            <div id="teamAScores" class="score-inputs"></div>
          </div>
        </div>

        <div class="vs-divider">VS</div>

        <!-- Team B -->
        <div class="team-section">
          <div class="team-section-header">Team B</div>
          <div class="form-group">
            <label class="form-label">Select Team</label>
            <select id="teamBSelect" class="form-input form-select" onchange="fillTeamPlayers('B')">
              <option value="">— Choose team —</option>
            </select>
          </div>
          <div id="teamBPlayers" class="players-grid"></div>
          <div class="form-group score-group">
            <label class="form-label">Team B — Player Scores</label>
            <div id="teamBScores" class="score-inputs"></div>
          </div>
        </div>
      </div>

      <div class="match-result-preview" id="matchPreview" style="display:none">
        <div class="result-team" id="previewA">Team A: <span id="previewScoreA">0</span></div>
        <div class="result-winner" id="previewWinner">—</div>
        <div class="result-team" id="previewB">Team B: <span id="previewScoreB">0</span></div>
      </div>

      <div id="matchError" class="error-msg hidden"></div>
      <div id="matchSuccess" class="success-msg hidden"></div>

      <div class="form-actions">
        <button class="btn btn-secondary" onclick="resetMatchForm()">Reset</button>
        <button class="btn btn-primary" onclick="saveMatch()">
          <svg viewBox="0 0 20 20" fill="none" width="16"><path d="M4 10L8 14L16 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Save Match
        </button>
      </div>
    </div>

    <!-- Judge's Match History -->
    <div class="card">
      <h3 class="card-title">My Match History</h3>
      <div id="judgeMatchHistory" class="match-history-list">
        <p class="empty-state">No matches recorded yet.</p>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/judge.js"></script>
</body>
</html>
