  <title>GeoChampion — Timetable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <nav class="navbar">

      <svg class="nav-pin" viewBox="0 0 24 32" fill="none">

    <div class="nav-links">
      <a href="index.html" class="nav-link">Standings</a>
      <a href="timetable.html" class="nav-link active">Timetable</a>

      <h1 class="page-title">Match <span class="accent">Timetable</span></h1>
