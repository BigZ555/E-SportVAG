<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoChampion — School Championship</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="deco deco-pin-1">
    <svg viewBox="0 0 40 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 0C9 0 0 9 0 20C0 35 20 56 20 56C20 56 40 35 40 20C40 9 31 0 20 0Z" fill="var(--accent)" opacity="0.15"/>
      <circle cx="20" cy="20" r="8" fill="var(--accent)" opacity="0.4"/>
    </svg>
  </div>
  <div class="deco deco-pin-2">
    <svg viewBox="0 0 40 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 0C9 0 0 9 0 20C0 35 20 56 20 56C20 56 40 35 40 20C40 9 31 0 20 0Z" fill="var(--accent2)" opacity="0.12"/>
      <circle cx="20" cy="20" r="8" fill="var(--accent2)" opacity="0.3"/>
    </svg>
  </div>
  <div class="deco deco-globe">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="45" stroke="var(--accent)" stroke-width="1" opacity="0.08"/>
      <ellipse cx="50" cy="50" rx="20" ry="45" stroke="var(--accent)" stroke-width="1" opacity="0.08"/>
      <line x1="5" y1="50" x2="95" y2="50" stroke="var(--accent)" stroke-width="1" opacity="0.08"/>
      <line x1="5" y1="35" x2="95" y2="35" stroke="var(--accent)" stroke-width="1" opacity="0.05"/>
      <line x1="5" y1="65" x2="95" y2="65" stroke="var(--accent)" stroke-width="1" opacity="0.05"/>
    </svg>
  </div>

  <nav class="navbar">
    <div class="nav-logo">
      <svg class="nav-pin" viewBox="0 0 24 32" fill="none">
        <path d="M12 0C5.4 0 0 5.4 0 12C0 21 12 32 12 32C12 32 24 21 24 12C24 5.4 18.6 0 12 0Z" fill="var(--accent)"/>
        <circle cx="12" cy="12" r="5" fill="var(--bg)"/>
      </svg>
      <span class="nav-title">GEO<span class="accent">CHAMP</span></span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link active">Standings</a>
      <a href="timetable.html" class="nav-link">Timetable</a>
      <a href="login.html" class="nav-link">Judge Login</a>
      <a href="admin.html" class="nav-link">Admin</a>
    </div>
  </nav>

  <main class="container">
    <header class="page-header">
      <div class="header-label">Live Standings</div>
      <h1 class="page-title">Championship<br/><span class="accent">Leaderboard</span></h1>
      <p class="page-sub">Track every team's journey across the globe</p>
    </header>

    <div class="stats-bar" id="statsBar">
      <div class="stat-card">
        <div class="stat-val" id="totalTeams">—</div>
        <div class="stat-label">Teams</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="totalMatches">—</div>
        <div class="stat-label">Matches Played</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="topTeam">—</div>
        <div class="stat-label">Current Leader</div>
      </div>
    </div>

    <!-- Round selector -->
    <div class="round-selector-bar" id="roundSelectorBar">
      <span class="round-selector-label">View standings for:</span>
      <div class="round-selector-btns" id="roundSelectorBtns">
        <button class="round-btn active" onclick="selectRound('overall')" id="btn-overall">Overall</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table class="leaderboard-table" id="leaderboardTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Team</th>
            <th>MP</th>
            <th>W</th>
            <th>D</th>
            <th>L</th>
            <th>Points</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
          <tr><td colspan="7" class="loading-row">Loading standings...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer class="footer">
    <span>GeoChampion · School Edition</span>
    <svg viewBox="0 0 24 32" fill="none" width="14">
      <path d="M12 0C5.4 0 0 5.4 0 12C0 21 12 32 12 32C12 32 24 21 24 12C24 5.4 18.6 0 12 0Z" fill="var(--accent)" opacity="0.5"/>
    </svg>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/public.js"></script>
</body>
</html>
