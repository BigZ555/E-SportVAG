<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoChampion — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="deco deco-pin-1">
    <svg viewBox="0 0 40 56" fill="none"><path d="M20 0C9 0 0 9 0 20C0 35 20 56 20 56C20 56 40 35 40 20C40 9 31 0 20 0Z" fill="var(--accent)" opacity="0.15"/><circle cx="20" cy="20" r="8" fill="var(--accent)" opacity="0.4"/></svg>
  </div>
  <div class="deco deco-globe">
    <svg viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="45" stroke="var(--accent)" stroke-width="1" opacity="0.08"/><ellipse cx="50" cy="50" rx="20" ry="45" stroke="var(--accent)" stroke-width="1" opacity="0.08"/><line x1="5" y1="50" x2="95" y2="50" stroke="var(--accent)" stroke-width="1" opacity="0.08"/></svg>
  </div>

  <nav class="navbar">
    <div class="nav-logo">
      <svg class="nav-pin" viewBox="0 0 24 32" fill="none"><path d="M12 0C5.4 0 0 5.4 0 12C0 21 12 32 12 32C12 32 24 21 24 12C24 5.4 18.6 0 12 0Z" fill="var(--accent)"/><circle cx="12" cy="12" r="5" fill="var(--bg)"/></svg>
      <span class="nav-title">GEO<span class="accent">CHAMP</span></span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Standings</a>
      <a href="login.html" class="nav-link active">Judge Login</a>
      <a href="admin.html" class="nav-link">Admin</a>
    </div>
  </nav>

  <main class="container center-content">
    <div class="login-card">
      <div class="login-icon">
        <svg viewBox="0 0 40 56" fill="none" width="36">
          <path d="M20 0C9 0 0 9 0 20C0 35 20 56 20 56C20 56 40 35 40 20C40 9 31 0 20 0Z" fill="var(--accent)"/>
          <circle cx="20" cy="20" r="8" fill="var(--bg)"/>
        </svg>
      </div>
      <h2 class="login-title">Judge <span class="accent">Access</span></h2>
      <p class="login-sub">Enter your credentials to manage rounds</p>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="loginUsername" class="form-input" placeholder="judge1" autocomplete="username" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <div id="loginError" class="error-msg hidden"></div>

      <button class="btn btn-primary btn-full" id="loginBtn" onclick="handleLogin()">
        <svg viewBox="0 0 20 20" fill="none" width="16"><path d="M10 2L18 10L10 18M2 10H18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Sign In
      </button>

      <a href="index.html" class="back-link">← Back to Standings</a>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
