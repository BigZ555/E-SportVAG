<!-- Tab Navigation -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('teams')">Teams</button>
  <button class="tab-btn" onclick="switchTab('rounds')">Rounds & Timetable</button>
  <button class="tab-btn" onclick="switchTab('matches')">All Matches</button>
  <button class="tab-btn" onclick="switchTab('stats')">Statistics</button>
  <button class="tab-btn" onclick="switchTab('judges')">Judges</button>
</div>

<!-- ROUNDS TAB -->
<div id="tab-rounds" class="tab-content hidden">
  <div class="card">
    <h3 class="card-title">Create New Round</h3>
    <div class="form-group">
      <label class="form-label">Round Name</label>
      <input type="text" id="roundName" class="form-input" placeholder="Round 1 - Group Stage" value="Round 1">
    </div>
    <button class="btn btn-primary" onclick="createRound()">Create Round</button>
  </div>

  <div class="card">
    <h3 class="card-title">Timetable - Add Scheduled Match</h3>
    <div class="form-group">
      <label>Round</label>
      <select id="scheduleRoundSelect" class="form-input"></select>
    </div>
    <div class="form-group">
      <label>Time</label>
      <input type="text" id="scheduleTime" class="form-input" placeholder="2026-06-20 14:30">
    </div>
    <div class="two-col-layout">
      <div>
        <label>Team A</label>
        <select id="scheduleTeamA" class="form-input"></select>
      </div>
      <div>
        <label>Team B</label>
        <select id="scheduleTeamB" class="form-input"></select>
      </div>
    </div>
    <div class="form-group">
      <label>Room</label>
      <input type="text" id="scheduleRoom" class="form-input" placeholder="Room 101">
    </div>
    <button class="btn btn-primary" onclick="addToSchedule()">Add to Timetable</button>
  </div>

  <div id="roundsList" class="card"></div>
  <div id="scheduleList" class="card"></div>
</div>
